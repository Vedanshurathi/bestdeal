<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Deal Best – Real Estate Deals Made Simple</title>
<meta name="description" content="Post your property for just ₹99 and connect directly with genuine buyers on Deal Best. India's transparent real estate marketplace."/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
--green:#1a7a4a;--green-dark:#145e39;--green-light:#e8f5ee;
--amber:#f59e0b;--amber-light:#fef3c7;
--red:#ef4444;--red-light:#fee2e2;
--bg:#f7f6f3;--card:#ffffff;--border:#e5e3de;
--text:#1a1a1a;--text-2:#4a4a4a;--text-3:#888;
--shadow:0 2px 12px rgba(0,0,0,.08);
--shadow-lg:0 8px 40px rgba(0,0,0,.13);
--radius:14px;--radius-sm:8px;
}
html{scroll-behavior:smooth}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;-webkit-font-smoothing:antialiased}
h1,h2,h3,h4{font-family:'Playfair Display',serif}
button{cursor:pointer;font-family:'DM Sans',sans-serif}
input,select,textarea{font-family:'DM Sans',sans-serif}
.btn{display:inline-flex;align-items:center;gap:6px;padding:10px 20px;border-radius:var(--radius-sm);border:none;font-size:14px;font-weight:600;transition:all .18s}
.btn-primary{background:var(--green);color:#fff}
.btn-primary:hover{background:var(--green-dark);transform:translateY(-1px)}
.btn-outline{background:transparent;color:var(--green);border:2px solid var(--green)}
.btn-outline:hover{background:var(--green);color:#fff}
.btn-amber{background:var(--amber);color:#000}
.btn-amber:hover{background:#d97706;color:#000}
.btn-ghost{background:transparent;color:var(--text-2);border:1.5px solid var(--border)}
.btn-ghost:hover{background:var(--border)}
.btn-danger{background:var(--red);color:#fff;border:none}
.btn-sm{padding:6px 14px;font-size:13px}
.btn-lg{padding:14px 28px;font-size:16px}
.card{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);border:1px solid var(--border)}
.badge{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:20px;font-size:12px;font-weight:600}
.badge-green{background:var(--green-light);color:var(--green)}
.badge-amber{background:var(--amber-light);color:#92400e}
.badge-red{background:var(--red-light);color:var(--red)}
.badge-gray{background:#f0f0f0;color:#555}
input[type=text],input[type=email],input[type=tel],input[type=number],input[type=password],select,textarea{
width:100%;padding:10px 14px;border:1.5px solid var(--border);border-radius:var(--radius-sm);font-size:14px;background:#fff;color:var(--text);outline:none;transition:border .15s}
input:focus,select:focus,textarea:focus{border-color:var(--green)}
label{font-size:13px;font-weight:600;color:var(--text-2);display:block;margin-bottom:5px}
.form-group{margin-bottom:16px}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px}
@media(max-width:600px){.grid-2,.grid-3{grid-template-columns:1fr}}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:1000;display:flex;align-items:center;justify-content:center;padding:16px}
.modal{background:#fff;border-radius:var(--radius);width:100%;max-width:480px;max-height:90vh;overflow-y:auto;box-shadow:var(--shadow-lg)}
.modal-header{padding:20px 24px 0;display:flex;align-items:center;justify-content:space-between}
.modal-body{padding:20px 24px 24px}
.close-btn{background:none;border:none;font-size:22px;color:var(--text-3);cursor:pointer;line-height:1}
.close-btn:hover{color:var(--text)}
/* Nav */
.topnav{background:#fff;border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100;padding:0 24px}
.topnav-inner{display:flex;align-items:center;justify-content:space-between;height:60px;max-width:1200px;margin:0 auto}
.logo{font-family:'Playfair Display',serif;font-size:22px;font-weight:800;color:var(--green);display:flex;align-items:center;gap:8px;text-decoration:none}
.logo-dot{width:8px;height:8px;background:var(--amber);border-radius:50%;margin-bottom:4px}
.nav-links{display:flex;align-items:center;gap:20px}
.nav-link{background:none;border:none;font-size:14px;font-weight:500;color:var(--text-2);padding:4px 0;cursor:pointer;border-bottom:2px solid transparent;transition:all .15s}
.nav-link:hover,.nav-link.active{color:var(--green);border-bottom-color:var(--green)}
.bottom-nav{display:none;position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid var(--border);z-index:100;padding:8px 0 env(safe-area-inset-bottom,8px)}
.bottom-nav-inner{display:grid;grid-template-columns:repeat(5,1fr)}
.bnav-item{display:flex;flex-direction:column;align-items:center;gap:3px;padding:6px 4px;background:none;border:none;font-size:10px;font-weight:600;color:var(--text-3);cursor:pointer;transition:color .15s}
.bnav-item.active,.bnav-item:hover{color:var(--green)}
.bnav-icon{font-size:20px;line-height:1}
@media(max-width:768px){
  .bottom-nav{display:block}
  .nav-links{display:none}
  body{padding-bottom:65px}
}
/* Page layouts */
.page{max-width:1200px;margin:0 auto;padding:24px 16px}
.page-wide{max-width:100%;padding:0}
/* Hero */
.hero{background:linear-gradient(135deg,#0f4d2c 0%,#1a7a4a 50%,#145e39 100%);color:#fff;padding:80px 24px 60px;text-align:center;position:relative;overflow:hidden}
.hero::before{content:'';position:absolute;inset:0;background:url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23ffffff' fill-opacity='0.04'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E")}
.hero-inner{position:relative;max-width:760px;margin:0 auto}
.hero h1{font-size:clamp(28px,5vw,52px);line-height:1.15;margin-bottom:16px;font-weight:800}
.hero p{font-size:clamp(15px,2vw,18px);opacity:.88;margin-bottom:32px;line-height:1.7}
.hero-search{background:#fff;border-radius:14px;padding:16px;display:flex;gap:10px;flex-wrap:wrap;box-shadow:var(--shadow-lg);margin-bottom:32px}
.hero-search input,.hero-search select{flex:1;min-width:140px}
.hero-badges{display:flex;gap:12px;justify-content:center;flex-wrap:wrap}
.hero-badge{background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.25);border-radius:20px;padding:6px 16px;font-size:13px}
/* Property cards */
.prop-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:20px}
.prop-card{background:#fff;border-radius:var(--radius);border:1px solid var(--border);overflow:hidden;cursor:pointer;transition:transform .18s,box-shadow .18s}
.prop-card:hover{transform:translateY(-3px);box-shadow:var(--shadow-lg)}
.prop-img{width:100%;height:200px;object-fit:cover;background:linear-gradient(135deg,#e8f5ee,#c8e6d4);display:flex;align-items:center;justify-content:center;font-size:48px;position:relative}
.prop-img-overlay{position:absolute;top:10px;left:10px;right:10px;display:flex;justify-content:space-between}
.prop-body{padding:14px}
.prop-price{font-size:20px;font-weight:700;color:var(--green);font-family:'Playfair Display',serif}
.prop-title{font-size:14px;font-weight:600;color:var(--text);margin:4px 0;line-height:1.4;font-family:'DM Sans',sans-serif}
.prop-loc{font-size:13px;color:var(--text-3);display:flex;align-items:center;gap:4px;margin-bottom:10px}
.prop-tags{display:flex;gap:6px;flex-wrap:wrap}
.prop-tag{background:#f3f4f6;color:var(--text-2);padding:3px 8px;border-radius:6px;font-size:12px;font-weight:500}
.prop-actions{display:flex;justify-content:space-between;align-items:center;margin-top:12px;padding-top:12px;border-top:1px solid var(--border)}
/* Filters sidebar */
.filter-sidebar{background:#fff;border-radius:var(--radius);border:1px solid var(--border);padding:20px;position:sticky;top:80px;height:fit-content}
.search-layout{display:grid;grid-template-columns:280px 1fr;gap:20px}
@media(max-width:900px){.search-layout{grid-template-columns:1fr}}
/* Chat */
.chat-layout{display:grid;grid-template-columns:320px 1fr;height:calc(100vh - 120px);background:#fff;border-radius:var(--radius);border:1px solid var(--border);overflow:hidden}
@media(max-width:700px){.chat-layout{grid-template-columns:1fr}}
.chat-list{border-right:1px solid var(--border);overflow-y:auto}
.chat-item{padding:14px;cursor:pointer;border-bottom:1px solid var(--border);transition:background .1s;display:flex;gap:12px;align-items:flex-start}
.chat-item:hover,.chat-item.active{background:var(--green-light)}
.chat-avatar{width:44px;height:44px;border-radius:50%;background:var(--green);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:16px;flex-shrink:0}
.chat-window{display:flex;flex-direction:column;height:100%}
.chat-header{padding:14px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px;background:#fafafa}
.messages-area{flex:1;overflow-y:auto;padding:20px;display:flex;flex-direction:column;gap:10px;background:#f7f6f3}
.msg{max-width:72%;padding:10px 14px;border-radius:12px;font-size:14px;line-height:1.5}
.msg-in{align-self:flex-start;background:#fff;border:1px solid var(--border);border-bottom-left-radius:4px}
.msg-out{align-self:flex-end;background:var(--green);color:#fff;border-bottom-right-radius:4px}
.msg-time{font-size:11px;opacity:.7;margin-top:4px;text-align:right}
.chat-input-bar{padding:12px 16px;border-top:1px solid var(--border);display:flex;gap:10px;background:#fff}
.chat-input-bar input{flex:1;border-radius:24px;padding:10px 16px}
/* Dashboard */
.dash-stats{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:16px;margin-bottom:24px}
.stat-card{background:#fff;border-radius:var(--radius);border:1px solid var(--border);padding:18px;text-align:center}
.stat-num{font-size:32px;font-weight:800;color:var(--green);font-family:'Playfair Display',serif}
.stat-label{font-size:13px;color:var(--text-3);margin-top:4px}
/* Steps */
.steps{display:flex;gap:0;margin-bottom:28px}
.step{flex:1;text-align:center;position:relative}
.step-circle{width:32px;height:32px;border-radius:50%;border:2px solid var(--border);background:#fff;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;margin:0 auto 6px;position:relative;z-index:1}
.step.done .step-circle{background:var(--green);border-color:var(--green);color:#fff}
.step.active .step-circle{border-color:var(--green);color:var(--green)}
.step::before{content:'';position:absolute;top:16px;left:-50%;right:50%;height:2px;background:var(--border);z-index:0}
.step:first-child::before{display:none}
.step.done::before{background:var(--green)}
.step-label{font-size:11px;color:var(--text-3);font-weight:600}
.step.active .step-label{color:var(--green)}
/* Amenities */
.amenity-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:8px}
.amenity-item{display:flex;align-items:center;gap:8px;padding:8px 12px;border:1.5px solid var(--border);border-radius:var(--radius-sm);cursor:pointer;font-size:13px;transition:all .15s;background:#fff}
.amenity-item.selected{border-color:var(--green);background:var(--green-light);color:var(--green)}
/* Tabs */
.tabs{display:flex;gap:0;border-bottom:2px solid var(--border);margin-bottom:20px}
.tab{padding:10px 20px;background:none;border:none;font-size:14px;font-weight:600;color:var(--text-3);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-2px;transition:all .15s}
.tab.active{color:var(--green);border-bottom-color:var(--green)}
/* Gallery */
.gallery{display:grid;grid-template-columns:2fr 1fr;gap:4px;border-radius:var(--radius);overflow:hidden;height:360px}
.gallery-main{height:100%;background:linear-gradient(135deg,#e8f5ee,#c8e6d4);display:flex;align-items:center;justify-content:center;font-size:72px}
.gallery-side{display:grid;grid-template-rows:1fr 1fr;gap:4px}
.gallery-thumb{background:linear-gradient(135deg,#dde8f7,#b8d4ee);display:flex;align-items:center;justify-content:center;font-size:36px}
@media(max-width:600px){.gallery{grid-template-columns:1fr;height:240px}.gallery-side{display:none}}
/* Seller info box */
.seller-box{background:var(--green-light);border-radius:var(--radius);padding:20px;border:1px solid #c0ddc9}
/* Payment */
.payment-box{text-align:center;padding:32px}
.price-big{font-size:48px;font-weight:800;color:var(--green);font-family:'Playfair Display',serif}
.upi-options{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin:20px 0}
.upi-btn{border:2px solid var(--border);border-radius:var(--radius-sm);padding:14px;background:#fff;cursor:pointer;font-size:14px;font-weight:600;display:flex;align-items:center;justify-content:center;gap:8px;transition:all .15s}
.upi-btn:hover,.upi-btn.selected{border-color:var(--green);background:var(--green-light);color:var(--green)}
/* Map placeholder */
.map-placeholder{background:linear-gradient(135deg,#e8eef5,#d5e2ee);border-radius:var(--radius);height:300px;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:12px;border:1px solid var(--border)}
/* Toast */
.toast-container{position:fixed;top:80px;right:20px;z-index:9999;display:flex;flex-direction:column;gap:8px}
.toast{background:#1a1a1a;color:#fff;padding:12px 20px;border-radius:var(--radius-sm);font-size:14px;box-shadow:var(--shadow-lg);animation:slideIn .3s ease;display:flex;align-items:center;gap:10px;max-width:320px}
.toast-success{border-left:4px solid var(--green)}
.toast-error{border-left:4px solid var(--red)}
@keyframes slideIn{from{opacity:0;transform:translateX(40px)}to{opacity:1;transform:translateX(0)}}
/* Admin */
.admin-sidebar{width:220px;background:#1a1a1a;min-height:100vh;padding:20px 0;flex-shrink:0}
.admin-layout{display:flex;min-height:100vh}
.admin-content{flex:1;padding:24px;background:var(--bg);overflow-y:auto}
.admin-nav-item{display:flex;align-items:center;gap:10px;padding:12px 20px;font-size:14px;font-weight:500;color:rgba(255,255,255,.7);cursor:pointer;transition:all .15s;background:none;border:none;width:100%;text-align:left}
.admin-nav-item:hover,.admin-nav-item.active{background:rgba(255,255,255,.08);color:#fff}
.admin-logo{padding:20px;font-family:'Playfair Display',serif;font-size:20px;font-weight:800;color:#fff;border-bottom:1px solid rgba(255,255,255,.1);margin-bottom:10px}
/* Table */
.data-table{width:100%;border-collapse:collapse;background:#fff;border-radius:var(--radius);overflow:hidden;box-shadow:var(--shadow)}
.data-table th{background:#f8f8f8;padding:12px 16px;text-align:left;font-size:13px;font-weight:700;color:var(--text-2);border-bottom:1px solid var(--border)}
.data-table td{padding:12px 16px;font-size:14px;border-bottom:1px solid var(--border)}
.data-table tr:last-child td{border-bottom:none}
.data-table tr:hover td{background:#fafafa}
/* Price insight */
.price-insight{background:linear-gradient(135deg,var(--amber-light),#fde68a);border-radius:var(--radius);padding:16px 20px;border:1px solid #f59e0b40;margin:16px 0}
/* Reviews */
.star{color:var(--amber);font-size:18px}
.star-empty{color:#ddd;font-size:18px}
/* Photo upload */
.photo-upload{border:2px dashed var(--border);border-radius:var(--radius);padding:32px;text-align:center;cursor:pointer;transition:border .15s;background:#fafafa}
.photo-upload:hover{border-color:var(--green);background:var(--green-light)}
/* Section heading */
.section-heading{margin-bottom:24px}
.section-heading h2{font-size:clamp(22px,3vw,30px)}
.section-heading p{color:var(--text-2);margin-top:6px;font-size:15px}
/* Why section */
.why-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:20px;margin:24px 0}
.why-card{background:#fff;border-radius:var(--radius);border:1px solid var(--border);padding:24px;text-align:center}
.why-icon{font-size:36px;margin-bottom:12px}
.why-card h3{font-size:18px;margin-bottom:6px}
.why-card p{font-size:14px;color:var(--text-2);line-height:1.6}
/* Footer */
.footer{background:#1a1a1a;color:rgba(255,255,255,.75);padding:40px 24px;margin-top:60px}
.footer-inner{max-width:1200px;margin:0 auto}
.footer-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:32px;margin-bottom:32px}
.footer-title{color:#fff;font-weight:700;margin-bottom:12px;font-size:15px}
.footer-links{display:flex;flex-direction:column;gap:8px}
.footer-link{color:rgba(255,255,255,.6);font-size:14px;cursor:pointer;background:none;border:none;text-align:left;transition:color .15s}
.footer-link:hover{color:#fff}
.footer-bottom{border-top:1px solid rgba(255,255,255,.1);padding-top:20px;display:flex;justify-content:space-between;flex-wrap:gap;align-items:center;gap:12px}
/* FAQ */
.faq-item{background:#fff;border-radius:var(--radius-sm);border:1px solid var(--border);margin-bottom:8px;overflow:hidden}
.faq-q{padding:14px 18px;font-weight:600;cursor:pointer;display:flex;justify-content:space-between;align-items:center;font-size:14px}
.faq-a{padding:0 18px 14px;font-size:14px;color:var(--text-2);line-height:1.7;display:none}
.faq-item.open .faq-a{display:block}
/* Profile avatar */
.big-avatar{width:80px;height:80px;border-radius:50%;background:var(--green);color:#fff;display:flex;align-items:center;justify-content:center;font-size:28px;font-weight:700}
/* Range */
input[type=range]{-webkit-appearance:none;height:4px;background:var(--border);border-radius:2px;outline:none;width:100%}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:16px;height:16px;border-radius:50%;background:var(--green);cursor:pointer}
/* Loading */
.spinner{width:32px;height:32px;border:3px solid var(--border);border-top-color:var(--green);border-radius:50%;animation:spin 0.7s linear infinite;margin:0 auto}
@keyframes spin{to{transform:rotate(360deg)}}
/* Pulse dot */
.online-dot{width:8px;height:8px;background:#22c55e;border-radius:50%;display:inline-block}
/* Report modal */
.report-option{display:flex;align-items:center;gap:10px;padding:10px;cursor:pointer;border-radius:var(--radius-sm);transition:background .1s}
.report-option:hover{background:var(--green-light)}
.report-option input{width:auto;accent-color:var(--green)}
/* Blog */
.blog-card{background:#fff;border-radius:var(--radius);border:1px solid var(--border);overflow:hidden;cursor:pointer;transition:transform .18s}
.blog-card:hover{transform:translateY(-2px);box-shadow:var(--shadow-lg)}
.blog-img{height:160px;background:linear-gradient(135deg,#e8f5ee,#b8d4c4);display:flex;align-items:center;justify-content:center;font-size:48px}
.blog-body{padding:16px}
.blog-tag{font-size:11px;font-weight:700;color:var(--green);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px}
.blog-body h3{font-size:16px;margin-bottom:6px;line-height:1.4;font-family:'DM Sans',sans-serif;font-weight:700}
.blog-body p{font-size:13px;color:var(--text-2);line-height:1.6}
/* KYC */
.kyc-box{border:2px dashed var(--border);border-radius:var(--radius);padding:24px;text-align:center;background:#fafafa}
.kyc-box.verified{border-color:var(--green);background:var(--green-light)}
/* Notification dot */
.notif-dot{width:8px;height:8px;background:var(--red);border-radius:50%;position:absolute;top:-2px;right:-2px}
/* view toggle */
.view-toggle{display:flex;gap:0;border:1.5px solid var(--border);border-radius:var(--radius-sm);overflow:hidden}
.view-btn{padding:8px 14px;background:none;border:none;font-size:16px;cursor:pointer;transition:background .15s}
.view-btn.active{background:var(--green);color:#fff}
/* scroll snap photos */
.photo-scroll{display:flex;gap:8px;overflow-x:auto;padding-bottom:8px;scroll-snap-type:x mandatory}
.photo-scroll::-webkit-scrollbar{height:4px}
.photo-scroll::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
.photo-scroll-item{flex-shrink:0;width:120px;height:90px;border-radius:8px;background:linear-gradient(135deg,#e8f5ee,#c8e6d4);display:flex;align-items:center;justify-content:center;font-size:28px;scroll-snap-align:start;cursor:pointer;border:2px solid transparent;transition:border .15s}
.photo-scroll-item.active{border-color:var(--green)}
</style>
</head>
<body>
<div id="root"></div>
<script>
const {useState,useEffect,useRef,useCallback}=React;
// ─── MOCK DATA ────────────────────────────────────────────────────────────────

**1. Always Sign a Rent Agreement**
A registered rent agreement is your strongest protection. It should clearly mention the rent amount, security deposit, duration, and notice period.

**2. Watch for Red Flags**
- Owners who demand more than 2-months security deposit
- No willingness to sign a proper rent agreement
- Pressure to move in immediately without proper documentation
- Asking for payment in cash only

**3. Verify the Owner**
Always ask for ownership documents. On Deal Best, look for the "Verified Owner" badge.

**4. Check Utilities**
Clarify who pays for maintenance, electricity, water, and society charges before signing.`},

**Essential Documents Checklist:**
- Sale Deed (registered with Sub-Registrar)
- Title/Ownership Documents
- Encumbrance Certificate (last 15 years)
- Property Tax Receipts
- NOC from Society/RWA
- Completion Certificate (for apartments)
- Occupancy Certificate
- Approved Building Plan
- Aadhar & PAN of all sellers

**For Apartments:**
